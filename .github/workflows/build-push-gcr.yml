name: Build and Push to GCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: project-7d27fad9-61bb-42c4-b2e
  IMAGE: us-central1-docker.pkg.dev/project-7d27fad9-61bb-42c4-b2e/backstage/backstage
  WORKLOAD_IDENTITY_PROVIDER: projects/616359343889/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-gcr@project-7d27fad9-61bb-42c4-b2e.iam.gserviceaccount.com

jobs:
  build-push:
    name: Build & Push to GCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ env.SERVICE_ACCOUNT }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.gke
        push: true
        tags: |
          ${{ env.IMAGE }}:${{ github.sha }}
          ${{ env.IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: idp-poc-cluster
        location: us-central1-a
        project_id: ${{ env.PROJECT_ID }}

    - name: Deploy to GKE
      run: |
        kubectl rollout restart deployment/backstage -n idp
        kubectl rollout status deployment/backstage -n idp --timeout=300s
