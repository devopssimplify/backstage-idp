name: Build and Push to GCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: project-7d27fad9-61bb-42c4-b2e
  IMAGE: us-central1-docker.pkg.dev/project-7d27fad9-61bb-42c4-b2e/backstage/backstage
  WORKLOAD_IDENTITY_PROVIDER: projects/616359343889/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-gcr@project-7d27fad9-61bb-42c4-b2e.iam.gserviceaccount.com

jobs:
  build-push:
    name: Build & Push to GCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ env.SERVICE_ACCOUNT }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Build Docker image
      run: |
        docker build \
          --progress=plain \
          -t ${{ env.IMAGE }}:${{ github.sha }} \
          -t ${{ env.IMAGE }}:latest \
          -f Dockerfile.gke \
          .

    - name: Push to GCR
      run: |
        docker push ${{ env.IMAGE }}:${{ github.sha }}
        docker push ${{ env.IMAGE }}:latest

    - name: Output image
      run: |
        echo "Image pushed: ${{ env.IMAGE }}:${{ github.sha }}"

    - name: Install GKE auth plugin
      run: |
        sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

    - name: Deploy to GKE
      run: |
        gcloud container clusters get-credentials idp-poc-cluster \
          --zone us-central1-a \
          --project ${{ env.PROJECT_ID }}
        kubectl rollout restart deployment/backstage -n idp
        kubectl rollout status deployment/backstage -n idp --timeout=300s
