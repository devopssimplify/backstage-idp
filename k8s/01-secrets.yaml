# IMPORTANT: Before applying, replace the base64 encoded values below
# To encode values: echo -n "your-value" | base64
#
# Required secrets:
# - GITHUB_TOKEN: Your GitHub Personal Access Token
# - POSTGRES_PASSWORD: Password for PostgreSQL database
# - POSTGRES_USER: PostgreSQL username (default: backstage)
# - POSTGRES_HOST: PostgreSQL host (e.g., postgresql.idp.svc.cluster.local or Cloud SQL proxy)
# - POSTGRES_PORT: PostgreSQL port (default: 5432)

apiVersion: v1
kind: Secret
metadata:
  name: backstage-secrets
  namespace: idp
type: Opaque
data:
  # GitHub token - replace with: echo -n "ghp_your_token" | base64
  GITHUB_TOKEN: REPLACE_WITH_BASE64_ENCODED_GITHUB_TOKEN

  # PostgreSQL connection details
  # Replace with: echo -n "backstage" | base64
  POSTGRES_USER: YmFja3N0YWdl

  # Replace with: echo -n "your-secure-password" | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD

  # Replace with: echo -n "postgresql.idp.svc.cluster.local" | base64
  # Or for Cloud SQL: echo -n "127.0.0.1" | base64 (if using Cloud SQL proxy)
  POSTGRES_HOST: cG9zdGdyZXNxbC5pZHAuc3ZjLmNsdXN0ZXIubG9jYWw=

  # Replace with: echo -n "5432" | base64
  POSTGRES_PORT: NTQzMg==
