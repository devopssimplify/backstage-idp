apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          # start-dev: embedded H2 DB, good for initial setup.
          # Switch to "start" with DB env vars for production.
          args: ["start-dev"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            # Uncomment below and switch args to ["start"] for production w/ Cloud SQL
            # - name: KC_DB
            #   value: postgres
            # - name: KC_DB_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: keycloak-secret
            #       key: db-url
            # - name: KC_DB_USERNAME
            #   valueFrom:
            #     secretKeyRef:
            #       name: keycloak-secret
            #       key: db-username
            # - name: KC_DB_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: keycloak-secret
            #       key: db-password
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
