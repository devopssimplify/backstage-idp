apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: delete-kafka-cluster
  title: "[Admin] Delete Kafka Cluster"
  description: "⚠️ Permanently delete a Kafka cluster, zookeeper and Kafka UI"
  tags:
    - kafka
    - admin
    - delete
spec:
  owner: platform-team
  type: admin

  parameters:
    - title: Cluster to Delete
      required:
        - namePrefix
        - environment
      properties:
        namePrefix:
          title: Cluster Name Prefix
          type: string
          description: Name prefix of the Kafka cluster to delete (e.g. "pds" deletes pds-kafka cluster and pds-kafka-ui)
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true
        environment:
          title: Environment
          type: string
          description: Namespace where the Kafka cluster is running
          enum:
            - dev
            - staging
            - production
        reason:
          title: Deletion Reason
          type: string
          description: Why is this Kafka cluster being deleted?

    - title: Confirm Deletion
      required:
        - confirmDeletion
      properties:
        confirmDeletion:
          title: "I understand this will permanently delete the Kafka cluster and all its data"
          type: boolean
          default: false
          ui:widget: checkbox

  steps:
    - id: verify-confirmation
      name: Verify Confirmation
      action: debug:log
      input:
        message: "Deletion confirmed for Kafka cluster ${{ parameters.namePrefix }}-kafka in ${{ parameters.environment }}"

    - id: trigger-workflow
      name: Trigger Deletion Workflow
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=idp-poc-gitops&owner=devopssimplify
        workflowId: delete-kafka-cluster.yml
        branchOrTagName: main
        workflowInputs:
          namePrefix: ${{ parameters.namePrefix }}
          environment: ${{ parameters.environment }}
          reason: ${{ parameters.reason }}

  output:
    text:
      - title: Resources Being Deleted
        content: |
          - Kafka cluster: `${{ parameters.namePrefix }}-kafka`
          - Kafka UI pod: `${{ parameters.namePrefix }}-kafka-ui`
          - Namespace: `${{ parameters.environment }}`
    links:
      - title: View Workflow Run
        url: https://github.com/devopssimplify/idp-poc-gitops/actions/workflows/delete-kafka-cluster.yml
