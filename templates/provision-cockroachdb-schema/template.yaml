apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-cockroachdb-schema
  title: Provision CockroachDB Schema & Tables
  description: Create schemas and tables in an existing CockroachDB database using SchemaHero
  tags:
    - database
    - cockroachdb
    - schemahero
    - schema
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Target Database
      required:
        - databaseName
        - environment
        - team
      properties:
        databaseName:
          title: Database Name
          type: string
          description: Name of the existing CockroachDB instance (e.g. pds-501-db)
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true
        environment:
          title: Environment
          type: string
          description: Namespace where the CockroachDB instance runs
          enum:
            - dev
            - staging
            - production
        team:
          title: Team Owner
          type: string
          description: Team that owns this schema
          enum:
            - platform
            - backend
            - frontend
            - data

    - title: Tables
      required:
        - tables
      properties:
        tables:
          title: Tables
          type: array
          description: Define the tables to create in the database
          minItems: 1
          items:
            type: object
            required:
              - tableName
            properties:
              tableName:
                title: Table Name
                type: string
                description: Table name (lowercase, underscores allowed)
                pattern: '^[a-z][a-z0-9_]*$'
              columns:
                title: Columns
                type: array
                description: Table columns (an id UUID primary key and created_at/updated_at timestamps are always added)
                items:
                  type: object
                  required:
                    - name
                    - type
                  properties:
                    name:
                      title: Column Name
                      type: string
                      pattern: '^[a-z][a-z0-9_]*$'
                    type:
                      title: Data Type
                      type: string
                      enum:
                        - varchar(255)
                        - text
                        - integer
                        - bigint
                        - boolean
                        - decimal(10,2)
                        - uuid
                        - timestamp
                        - jsonb
                        - date
                    notNull:
                      title: Not Null
                      type: boolean
                      default: false

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./skeleton
        values:
          databaseName: ${{ parameters.databaseName }}
          schemaName: ${{ parameters.databaseName }}
          environment: ${{ parameters.environment }}
          team: ${{ parameters.team }}
          tables: ${{ parameters.tables }}

    - id: publish-pr
      name: Create GitHub Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=idp-poc-gitops&owner=devopssimplify
        branchName: provision-schema-${{ parameters.databaseName }}-${{ parameters.environment }}
        title: 'feat: Create schema and tables for ${{ parameters.databaseName }} in ${{ parameters.environment }}'
        description: |
          ## CockroachDB Schema Provisioning Request

          **Database**: `${{ parameters.databaseName }}`
          **Schema**: `${{ parameters.schemaName if parameters.schemaName else parameters.databaseName }}`
          **Environment**: `${{ parameters.environment }}`
          **Team**: `${{ parameters.team }}`
          **Tables**: ${{ parameters.tables | length }}

          ### Tables Being Created
          ${{ parameters.tables | map(attribute='tableName') | join(', ') }}

          > Managed by [SchemaHero](https://schemahero.io) — merging this PR will apply the schema to the cluster.

          This PR was created by the Backstage scaffolder.
        targetPath: .

  output:
    links:
      - title: View Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
