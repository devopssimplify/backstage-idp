apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-cockroachdb
  title: Provision CockroachDB Database
  description: Create a new CockroachDB cluster on GKE
  tags:
    - database
    - cockroachdb
    - gcp
    - kubernetes
spec:
  owner: group:default/template-infra
  type: infrastructure

  parameters:
    - title: Database Information
      required:
        - databaseName
        - environment
        - team
        - networkCode
      properties:
        databaseName:
          title: Database Name
          type: string
          description: Name for the CockroachDB cluster
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true
        environment:
          title: Environment
          type: string
          description: Environment/Namespace for the database
          enum:
            - dev
            - staging
            - production
        team:
          title: Team Owner
          type: string
          description: Team that owns this database
          enum:
            - platform
            - backend
            - frontend
            - data
        networkCode:
          title: Network Code
          type: string
          description: Cost center / billing code for this resource (e.g. CN580004, pds-501)
          pattern: '^[a-zA-Z0-9]([-a-zA-Z0-9]*[a-zA-Z0-9])?$'
          ui:help: 'Used for GCP billing labels and resource grouping'
        description:
          title: Description
          type: string
          description: Brief description of the database purpose

    - title: Cluster Configuration
      properties:
        replicas:
          title: Number of Replicas
          type: integer
          description: Number of CockroachDB nodes (odd number recommended, use 1 for dev/testing)
          default: 1
          enum:
            - 1
            - 3
            - 5
            - 7
        storageSize:
          title: Storage Size per Node
          type: string
          description: Persistent volume size per node
          default: 5Gi
          enum:
            - 5Gi
            - 10Gi
            - 20Gi
            - 50Gi
            - 100Gi

    - title: Resource Configuration
      properties:
        cpuRequest:
          title: CPU Request per Node
          type: string
          description: CPU request for each CockroachDB node
          default: "100m"
          enum:
            - "100m"
            - "200m"
            - "500m"
            - "1"
            - "2"
        memoryRequest:
          title: Memory Request per Node
          type: string
          description: Memory request for each CockroachDB node
          default: "512Mi"
          enum:
            - "256Mi"
            - "512Mi"
            - "1Gi"
            - "2Gi"
            - "4Gi"
        cpuLimit:
          title: CPU Limit per Node
          type: string
          description: CPU limit for each CockroachDB node
          default: "500m"
          enum:
            - "200m"
            - "500m"
            - "1"
            - "2"
            - "4"
        memoryLimit:
          title: Memory Limit per Node
          type: string
          description: Memory limit for each CockroachDB node
          default: "1Gi"
          enum:
            - "512Mi"
            - "1Gi"
            - "2Gi"
            - "4Gi"
            - "8Gi"

    - title: Backup Configuration
      properties:
        enableBackups:
          title: Enable GCS Backups
          type: boolean
          default: true
          description: Enable automated backups to Google Cloud Storage
        backupSchedule:
          title: Backup Schedule
          type: string
          description: Cron schedule for backups (if enabled)
          default: "0 2 * * *"

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./skeleton
        values:
          databaseName: ${{ parameters.databaseName }}
          environment: ${{ parameters.environment }}
          team: ${{ parameters.team }}
          description: ${{ parameters.description }}
          replicas: ${{ parameters.replicas }}
          storageSize: ${{ parameters.storageSize }}
          cpuRequest: ${{ parameters.cpuRequest }}
          memoryRequest: ${{ parameters.memoryRequest }}
          cpuLimit: ${{ parameters.cpuLimit }}
          memoryLimit: ${{ parameters.memoryLimit }}
          enableBackups: ${{ parameters.enableBackups }}
          backupSchedule: ${{ parameters.backupSchedule }}
          gcpProject: project-7d27fad9-61bb-42c4-b2e
          networkCode: ${{ parameters.networkCode }}

    - id: publish-pr
      name: Create GitHub Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=idp-poc-gitops&owner=devopssimplify
        branchName: provision-cockroachdb-${{ parameters.databaseName }}
        title: 'feat: Provision CockroachDB cluster ${{ parameters.databaseName }} in ${{ parameters.environment }}'
        description: |
          ## CockroachDB Cluster Provisioning Request

          **Database Name**: ${{ parameters.databaseName }}
          **Environment**: ${{ parameters.environment }}
          **Team**: ${{ parameters.team }}
          **Description**: ${{ parameters.description }}

          ### Cluster Configuration
          - **Replicas**: ${{ parameters.replicas }}
          - **Storage per Node**: ${{ parameters.storageSize }}

          ### Resources per Node
          - **CPU Request/Limit**: ${{ parameters.cpuRequest }} / ${{ parameters.cpuLimit }}
          - **Memory Request/Limit**: ${{ parameters.memoryRequest }} / ${{ parameters.memoryLimit }}

          ### Backup Configuration
          - **Backups Enabled**: ${{ parameters.enableBackups }}
          - **Backup Schedule**: ${{ parameters.backupSchedule }}

          This PR was created by the Backstage scaffolder.
        sourcePath: infra
        targetPath: infra
    - id: publish-catalog-pr
      name: Register in Backstage Catalog
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=backstage-idp&owner=devopssimplify
        branchName: catalog-cockroachdb-${{ parameters.databaseName }}
        title: 'catalog: Register CockroachDB ${{ parameters.databaseName }} in Backstage'
        description: |
          Registers this resource in the Backstage catalog under network code **${{ parameters.networkCode }}**.
          Merge this PR to make the resource visible in the IDP portal.
        sourcePath: catalog
        targetPath: catalog

  output:
    links:
      - title: View Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
