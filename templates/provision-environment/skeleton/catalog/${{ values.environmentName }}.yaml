---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.environmentName }}-namespace
  description: "${{ values.description if values.description else values.environmentName + ' namespace environment' }}"
  tags:
    - namespace
    - environment
    - idp-managed
    - network-code-${{ values.networkCode }}
  links:
    - title: GitOps Source
      url: https://github.com/devopssimplify/idp-poc-gitops/blob/main/cluster/namespace-${{ values.environmentName }}.yaml
      icon: github
spec:
  type: environment
  lifecycle: production
  owner: group:default/${{ values.team }}
  system: ${{ values.networkCode }}
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{ values.networkCode }}
  description: "Network code ${{ values.networkCode }} — all resources billed to this cost center"
  tags:
    - network-code
    - idp-managed
spec:
  owner: group:default/${{ values.team }}
