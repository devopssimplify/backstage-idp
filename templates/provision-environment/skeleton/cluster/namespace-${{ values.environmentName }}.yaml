apiVersion: v1
kind: Namespace
metadata:
  name: ${{ values.environmentName }}
  labels:
    team: ${{ values.team }}
    network-code: ${{ values.networkCode }}
    managed-by: backstage
  annotations:
    description: "${{ values.description }}"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ${{ values.environmentName }}-quota
  namespace: ${{ values.environmentName }}
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ${{ values.environmentName }}-limits
  namespace: ${{ values.environmentName }}
spec:
  limits:
  - max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: 100m
      memory: 128Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
