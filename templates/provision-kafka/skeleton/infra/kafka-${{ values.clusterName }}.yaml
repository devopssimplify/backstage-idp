---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-${{ values.clusterName }}
  namespace: ${{ values.environment }}
  labels:
    app: kafka-${{ values.clusterName }}
    team: ${{ values.team }}
    managed-by: backstage
  annotations:
    description: "${{ values.description }}"
spec:
  kafka:
    version: ${{ values.kafkaVersion }}
    replicas: ${{ values.kafkaBrokers }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      {%- if values.kafkaBrokers == 1 %}
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      {%- else %}
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      {%- endif %}
      log.retention.hours: 168
      log.segment.bytes: 1073741824
    livenessProbe:
      initialDelaySeconds: 120
      timeoutSeconds: 5
      periodSeconds: 20
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 120
      timeoutSeconds: 5
      periodSeconds: 20
      failureThreshold: 3
    resources:
      requests:
        cpu: "${{ values.cpuRequest }}"
        memory: "${{ values.memoryRequest }}"
      limits:
        cpu: "${{ values.cpuLimit }}"
        memory: "${{ values.memoryLimit }}"
    storage:
      type: persistent-claim
      size: ${{ values.brokerStorageSize }}
      deleteClaim: false
      class: standard-rwo
    template:
      pod:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - kafka-${{ values.clusterName }}
                  topologyKey: kubernetes.io/hostname
        metadata:
          labels:
            app: kafka-${{ values.clusterName }}
            team: ${{ values.team }}
  zookeeper:
    replicas: ${{ values.zookeeperNodes }}
    storage:
      type: persistent-claim
      size: ${{ values.zookeeperStorageSize }}
      deleteClaim: false
      class: standard-rwo
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    template:
      pod:
        metadata:
          labels:
            app: kafka-${{ values.clusterName }}
            team: ${{ values.team }}
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
    userOperator:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
