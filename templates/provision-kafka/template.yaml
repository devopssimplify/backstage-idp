apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-kafka
  title: Provision Kafka Cluster
  description: Create a new Kafka cluster on Kubernetes using Strimzi operator
  tags:
    - kafka
    - messaging
    - kubernetes
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Cluster Information
      required:
        - namePrefix
        - environment
        - team
        - networkCode
      properties:
        namePrefix:
          title: Name Prefix
          type: string
          description: Prefix for all resource names (e.g. "pds" creates pds-kafka cluster and pds-kafka-ui pod)
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true
        environment:
          title: Environment
          type: string
          description: Environment/Namespace for the Kafka cluster
          enum:
            - dev
            - staging
            - production
        team:
          title: Team Owner
          type: string
          description: Team that owns this Kafka cluster
          enum:
            - platform
            - backend
            - frontend
            - data
        networkCode:
          title: Network Code
          type: string
          description: Cost center / billing code for this resource (e.g. CN580004, pds-501)
          pattern: '^[a-zA-Z0-9]([-a-zA-Z0-9]*[a-zA-Z0-9])?$'
          ui:help: 'Used for GCP billing labels and resource grouping'
        description:
          title: Description
          type: string
          description: Brief description of the Kafka cluster purpose

    - title: Cluster Configuration
      properties:
        kafkaBrokers:
          title: Number of Kafka Brokers
          type: integer
          description: Number of Kafka broker nodes (use 1 for dev/testing, 3+ for production)
          default: 1
          enum:
            - 1
            - 3
            - 5
        zookeeperNodes:
          title: Number of ZooKeeper Nodes
          type: integer
          description: Number of ZooKeeper nodes (use 1 for dev/testing, 3 for production)
          default: 1
          enum:
            - 1
            - 3
        kafkaVersion:
          title: Kafka Version
          type: string
          description: Kafka version to deploy
          default: "3.7.1"
          enum:
            - "3.8.0"
            - "3.7.1"
            - "3.7.0"

    - title: Storage Configuration
      properties:
        brokerStorageSize:
          title: Broker Storage Size
          type: string
          description: Persistent volume size per Kafka broker node
          default: 10Gi
          enum:
            - 5Gi
            - 10Gi
            - 20Gi
            - 50Gi
            - 100Gi
        zookeeperStorageSize:
          title: ZooKeeper Storage Size
          type: string
          description: Persistent volume size per ZooKeeper node
          default: 5Gi
          enum:
            - 1Gi
            - 5Gi
            - 10Gi

    - title: Resource Configuration
      properties:
        cpuRequest:
          title: CPU Request per Broker
          type: string
          description: CPU request for each Kafka broker
          default: "200m"
          enum:
            - "100m"
            - "200m"
            - "500m"
            - "1"
            - "2"
        memoryRequest:
          title: Memory Request per Broker
          type: string
          description: Memory request for each Kafka broker
          default: "512Mi"
          enum:
            - "256Mi"
            - "512Mi"
            - "1Gi"
            - "2Gi"
            - "4Gi"
        cpuLimit:
          title: CPU Limit per Broker
          type: string
          description: CPU limit for each Kafka broker
          default: "500m"
          enum:
            - "200m"
            - "500m"
            - "1"
            - "2"
            - "4"
        memoryLimit:
          title: Memory Limit per Broker
          type: string
          description: Memory limit for each Kafka broker
          default: "1Gi"
          enum:
            - "512Mi"
            - "1Gi"
            - "2Gi"
            - "4Gi"
            - "8Gi"

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./skeleton
        values:
          namePrefix: ${{ parameters.namePrefix }}
          clusterName: ${{ parameters.namePrefix }}-kafka
          environment: ${{ parameters.environment }}
          team: ${{ parameters.team }}
          description: ${{ parameters.description }}
          kafkaBrokers: ${{ parameters.kafkaBrokers }}
          zookeeperNodes: ${{ parameters.zookeeperNodes }}
          kafkaVersion: ${{ parameters.kafkaVersion }}
          brokerStorageSize: ${{ parameters.brokerStorageSize }}
          zookeeperStorageSize: ${{ parameters.zookeeperStorageSize }}
          cpuRequest: ${{ parameters.cpuRequest }}
          memoryRequest: ${{ parameters.memoryRequest }}
          cpuLimit: ${{ parameters.cpuLimit }}
          memoryLimit: ${{ parameters.memoryLimit }}
          networkCode: ${{ parameters.networkCode }}

    - id: publish-pr
      name: Create GitHub Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=idp-poc-gitops&owner=devopssimplify
        branchName: provision-kafka-${{ parameters.namePrefix }}
        title: 'feat: Provision Kafka cluster ${{ parameters.namePrefix }}-kafka in ${{ parameters.environment }}'
        description: |
          ## Kafka Cluster Provisioning Request

          **Name Prefix**: ${{ parameters.namePrefix }}
          **Cluster Name**: ${{ parameters.namePrefix }}-kafka
          **Environment**: ${{ parameters.environment }}
          **Team**: ${{ parameters.team }}
          **Description**: ${{ parameters.description }}

          ### Cluster Configuration
          - **Kafka Brokers**: ${{ parameters.kafkaBrokers }}
          - **ZooKeeper Nodes**: ${{ parameters.zookeeperNodes }}
          - **Kafka Version**: ${{ parameters.kafkaVersion }}

          ### Storage
          - **Broker Storage per Node**: ${{ parameters.brokerStorageSize }}
          - **ZooKeeper Storage per Node**: ${{ parameters.zookeeperStorageSize }}

          ### Resources per Broker
          - **CPU Request/Limit**: ${{ parameters.cpuRequest }} / ${{ parameters.cpuLimit }}
          - **Memory Request/Limit**: ${{ parameters.memoryRequest }} / ${{ parameters.memoryLimit }}

          ### Resources Created
          - Kafka cluster: `${{ parameters.namePrefix }}-kafka`
          - Kafka UI pod: `${{ parameters.namePrefix }}-kafka-ui`

          This PR was created by the Backstage scaffolder.
        sourcePath: infra
        targetPath: infra
    - id: publish-catalog-pr
      name: Register in Backstage Catalog
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=backstage-idp&owner=devopssimplify
        branchName: catalog-kafka-${{ parameters.namePrefix }}
        title: 'catalog: Register Kafka ${{ parameters.namePrefix }}-kafka in Backstage'
        description: |
          Registers this resource in the Backstage catalog under network code **${{ parameters.networkCode }}**.
          Merge this PR to make the resource visible in the IDP portal.
        sourcePath: catalog
        targetPath: catalog

  output:
    links:
      - title: View Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
